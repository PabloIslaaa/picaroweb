<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="PICAROPOKER — Juega al Texas Hold'em contra bots inteligentes.">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Poker — PICAROWEB</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/poker.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>

<body>
    <div class="poker-page">

        <!-- ============ START SCREEN ============ -->
        <div id="start-screen">
            <div class="menu-logo">♠ PICAROPOKER</div>
            <div class="menu-subtitle">Texas Hold'em No Limit</div>

            <div class="menu-stats">
                <div class="stat-box">
                    <div class="stat-value" id="menu-chips">1,000</div>
                    <div class="stat-label">Chips</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="menu-max-chips">1,000</div>
                    <div class="stat-label">Max Record</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="menu-games-played">0</div>
                    <div class="stat-label">Games</div>
                </div>
            </div>

            <div class="menu-section">
                <h3>Difficulty</h3>
                <div class="btn-group-poker">
                    <button class="difficulty-btn" data-difficulty="easy">🟢 Easy</button>
                    <button class="difficulty-btn selected" data-difficulty="medium">🟡 Medium</button>
                    <button class="difficulty-btn" data-difficulty="hard">🔴 Hard</button>
                </div>
            </div>

            <div class="menu-section">
                <h3>Game Mode</h3>
                <div class="btn-group-poker">
                    <button class="mode-btn" data-mode="1v1">⚡ 1 vs 1</button>
                    <button class="mode-btn selected" data-mode="6players">👥 6 Players</button>
                </div>
            </div>

            <button id="start-btn">Play Now</button>
        </div>

        <!-- ============ GAME SCREEN ============ -->
        <div id="game-screen" class="hidden">

            <!-- Top Bar -->
            <div class="top-bar">
                <span id="phase-display">Pre-Flop</span>
                <span id="last-action"></span>
            </div>

            <!-- Bots Area -->
            <div id="bots-container"></div>

            <!-- Center: Community Cards + Pot -->
            <div class="center-area">
                <div class="pot-display">
                    <div class="pot-label">Pot</div>
                    <div id="pot-amount">0</div>
                </div>
                <div id="community-cards"></div>
                <div id="timer-bar" class="hidden">
                    <div class="timer-fill"></div>
                </div>
            </div>

            <!-- Player Area -->
            <div id="player-area">
                <div class="player-info">
                    <span id="player-name">You</span>
                    <span id="player-chips">1,000</span>
                    <span id="player-bet"></span>
                </div>
                <div id="player-cards"></div>

                <!-- Action Buttons -->
                <div id="action-buttons" class="hidden">
                    <button class="action-btn" id="btn-fold">Fold</button>
                    <button class="action-btn" id="btn-check">Check</button>
                    <button class="action-btn" id="btn-call">Call</button>
                    <button class="action-btn" id="btn-raise">Raise</button>
                    <button class="action-btn" id="btn-allin">All-In</button>
                </div>

                <!-- Raise Controls -->
                <div id="raise-controls" class="hidden">
                    <div class="raise-header">
                        <span class="raise-label">Raise Amount</span>
                        <span id="raise-amount">0</span>
                    </div>
                    <input type="range" id="raise-slider" min="0" max="1000" value="0">
                    <div class="quick-buttons">
                        <button class="quick-btn" id="quick-x2">x2</button>
                        <button class="quick-btn" id="quick-half">50%</button>
                        <button class="quick-btn" id="quick-pot">Pot</button>
                        <button class="quick-btn" id="quick-allin">All-In</button>
                    </div>
                    <div class="raise-actions">
                        <button id="raise-confirm">Confirm Raise</button>
                        <button id="raise-cancel">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ RESULT OVERLAY ============ -->
        <div id="result-overlay" class="overlay hidden">
            <div id="result-title" class="result-title">You Win!</div>
            <div id="result-hand">Full House</div>
            <div id="result-amount" class="result-amount">+500</div>
            <div class="overlay-buttons">
                <button class="overlay-btn" id="result-next">Next Hand</button>
                <button class="overlay-btn" id="result-leave">Leave Table</button>
            </div>
        </div>

        <!-- ============ RELOAD OVERLAY ============ -->
        <div id="reload-overlay" class="overlay hidden">
            <div class="result-title">💸 Out of Chips!</div>
            <p class="reload-text">You've run out of chips. Game Over.</p>
            <button id="reload-btn" class="overlay-btn">Play Again (1,000 chips)</button>
            <span id="reload-timer"></span>
            <button class="overlay-btn" id="reload-leave-btn"
                style="margin-top:8px; background:transparent; border:1px solid rgba(255,255,255,0.2); color:#9e9e9e;">Back
                to Menu</button>
        </div>
    </div>

    <!-- Nav -->
    <script src="js/nav.js"></script>
    <script>injectNav('poker');</script>

    <!-- Game Scripts -->
    <script src="js/engine.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/bot.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
