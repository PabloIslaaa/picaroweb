<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="PICAROPOKER — Texas Hold'em Móvil">
    <meta name="theme-color" content="#0a3d2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Poker — PICAROWEB</title>
    <!-- Cache busted to v=6 for the new structural rewrite -->
    <link rel="stylesheet" href="css/global.css?v=6">
    <link rel="stylesheet" href="css/poker.css?v=6">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>

<body>
    <div class="poker-page">

        <!-- ============ START SCREEN ============ -->
        <div id="start-screen">
            <div class="menu-logo">♠ PICAROPOKER</div>
            <div class="menu-subtitle" style="margin-bottom: 30px;">Texas Hold'em No Limit</div>

            <div class="menu-section">
                <h3>Dificultad</h3>
                <div class="btn-group-poker">
                    <button class="difficulty-btn" data-difficulty="easy">🟢 Fácil</button>
                    <button class="difficulty-btn selected" data-difficulty="medium">🟡 Medio</button>
                    <button class="difficulty-btn" data-difficulty="hard">🔴 Difícil</button>
                </div>
            </div>

            <div class="menu-section">
                <h3>Modo de Juego</h3>
                <div class="btn-group-poker">
                    <button class="mode-btn" data-mode="1v1">⚡ 1 vs 1</button>
                    <button class="mode-btn selected" data-mode="6players">👥 6 Jugadores</button>
                </div>
            </div>

            <button id="start-btn" class="btn-massive">Jugar Ahora</button>
        </div>

        <!-- ============ GAME SCREEN ============ -->
        <div id="game-screen" class="hidden">

            <!-- 1. ZONA SUPERIOR: BOTS -->
            <div class="zone-top" id="bots-container">
                <!-- Los bots se renderizan dinámicamente aquí. Se dividirán en flex-wrap o grid. -->
            </div>

            <!-- 2. ZONA CENTRAL: COMUNITARIAS Y BOTE -->
            <div class="zone-center">
                <div class="pot-display">
                    <div class="pot-label">Bote Principal</div>
                    <div id="pot-amount">0</div>
                </div>
                <div id="community-cards" class="cards-row">
                    <!-- Cartas comunitarias aquí -->
                </div>

                <div class="game-info-badge">
                    <span id="phase-display">Pre-Flop</span>
                    <span id="last-action" class="last-action-text"></span>
                </div>
            </div>

            <!-- 3. ZONA INFERIOR: JUGADOR Y CONTROLES -->
            <div class="zone-bottom" id="player-area">

                <div class="player-top-row">
                    <div class="player-info-pill">
                        <span id="player-name">Tú</span>
                        <div class="chips-flex">
                            <span class="chip-icon">🪙</span>
                            <span id="player-chips">1,000</span>
                        </div>
                    </div>
                </div>

                <div id="player-cards" class="cards-row player-hole-cards">
                    <!-- Cartas del jugador aquí -->
                </div>

                <!-- Barra de tiempo -->
                <div id="timer-bar" class="hidden">
                    <div class="timer-fill"></div>
                </div>

                <!-- Botones de Acción -->
                <div id="action-buttons" class="action-grid hidden">
                    <button class="action-btn btn-fold" id="btn-fold">Fold</button>
                    <button class="action-btn btn-check" id="btn-check">Check</button>
                    <button class="action-btn btn-call" id="btn-call">Call</button>
                    <button class="action-btn btn-raise" id="btn-raise">Raise</button>
                    <button class="action-btn btn-allin" id="btn-allin">All-In</button>
                </div>

                <!-- Controles de Raise (Reemplaza los botones al hacer click en Raise) -->
                <div id="raise-controls" class="raise-panel hidden">
                    <div class="raise-header">
                        <span class="raise-label">Subir a:</span>
                        <span id="raise-amount" class="raise-val">0</span>
                    </div>

                    <div class="slider-container">
                        <input type="range" id="raise-slider" class="thumb-slider" min="0" max="1000" value="0">
                    </div>

                    <div class="quick-buttons-grid">
                        <button class="btn-quick" id="quick-x2">x2</button>
                        <button class="btn-quick" id="quick-half">1/2 Bote</button>
                        <button class="btn-quick" id="quick-pot">Bote</button>
                        <button class="btn-quick" id="quick-allin">All-In</button>
                    </div>

                    <div class="raise-actions">
                        <button id="raise-cancel" class="btn-raise-cancel">Cancelar</button>
                        <button id="raise-confirm" class="btn-raise-confirm">Confirmar Subida</button>
                    </div>
                </div>

            </div> <!-- Fin zone-bottom -->
        </div>

        <!-- ============ RESULT OVERLAY ============ -->
        <div id="result-overlay" class="overlay hidden">
            <div class="result-box">
                <div id="result-title" class="result-title"></div>
                <div id="result-hand" class="result-hand-name"></div>
                <div id="result-amount" class="result-amount"></div>
                <div class="overlay-buttons-col">
                    <button class="overlay-btn primary" id="result-next">Siguiente Mano</button>
                    <button class="overlay-btn secondary" id="result-leave">Salir de la mesa</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <script src="js/nav.js?v=6"></script>
    <script>injectNav('poker');</script>

    <!-- Limpieza estricta de estado local -->
    <script>
        try { localStorage.removeItem('poker_holdem_save'); } catch (e) { }
    </script>

    <!-- Game Scripts -->
    <script src="js/engine.js?v=6"></script>
    <script src="js/storage.js?v=6"></script>
    <script src="js/bot.js?v=6"></script>
    <script src="js/ui.js?v=6"></script>
    <script src="js/app.js?v=6"></script>
</body>

</html>
